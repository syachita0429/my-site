<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakurako's Profile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #2c3e50;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f8f9fa;
        }
        header {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }
        h1 {
            margin: 0;
            color: #2c3e50;
            font-size: 2.5rem;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }
        main {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        section {
            margin-bottom: 2rem;
        }
        h2 {
            border-left: 5px solid #3498db;
            padding-left: 1rem;
            color: #34495e;
            margin-bottom: 1rem;
        }
        .interest-tag {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #95a5a6;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sakurako</h1>
        <p class="subtitle">Economics Student</p>
    </header>
    <main>
        <section>
            <h2>自己紹介</h2>
            <p>こんにちは、Sakurakoです。大学で経済学を専攻しています。</p>
        </section>
        <section>
            <h2>専門・興味のある分野</h2>
            <p>特に<strong>マクロ経済学</strong>に強い関心を持って取り組んでいます。</p>
            <span class="interest-tag"># マクロ経済学</span>
            <span class="interest-tag"># 経済学</span>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Sakurako. Built with Gemini CLI.</p>
    </footer>
</body>
</html>
